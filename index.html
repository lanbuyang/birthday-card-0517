<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday · 5/17</title>
  <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Caveat:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: #0d0d1a;
      overflow-x: hidden;
    }

    /* floating particles */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp var(--dur, 6s) var(--delay, 0s) infinite ease-in;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* ── Card: 4×6 ratio (480×720) ── */
    .card {
      width: 480px;
      position: relative;
      z-index: 1;
      border-radius: 6px;
      overflow: hidden;
      box-shadow:
        0 0 0 3px #ff6eb4,
        0 0 0 7px #1a0d2e,
        0 0 0 10px #ffd166,
        0 30px 80px rgba(0,0,0,0.8);
      background: #100c1e;
    }

    /* ── Header ── */
    .card-header {
      position: relative;
      padding: 18px 20px 14px;
      background: #0d0920;
      text-align: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hdr-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(45px);
      pointer-events: none;
    }
    .hdr-glow.g1 { width:240px; height:150px; background:#c026d3; top:-70px; left:-50px; opacity:.45; }
    .hdr-glow.g2 { width:220px; height:140px; background:#f59e0b; top:-60px; right:-40px; opacity:.35; }
    .hdr-glow.g3 { width:160px; height:90px;  background:#ec4899; bottom:-30px; left:50%; transform:translateX(-50%); opacity:.3; }

    .hdr-sub {
      font-family: 'Rock Salt', cursive;
      font-size: 9px;
      color: #ffd166;
      letter-spacing: 5px;
      position: relative; z-index: 1;
      margin-bottom: 7px;
      text-shadow: 0 0 10px #ffd16699;
    }
    .hdr-title {
      font-family: 'Rock Salt', cursive;
      font-size: 32px;
      color: #fff;
      letter-spacing: 2px;
      position: relative; z-index: 1;
      line-height: 1;
      text-shadow:
        3px  3px 0 #c026d3,
        -3px -3px 0 #c026d3,
        3px -3px 0 #c026d3,
        -3px  3px 0 #c026d3,
        0 0 36px #ec489988;
      animation: pulse-title 3s ease-in-out infinite;
    }
    @keyframes pulse-title {
      0%, 100% { text-shadow: 3px 3px 0 #c026d3,-3px -3px 0 #c026d3,3px -3px 0 #c026d3,-3px 3px 0 #c026d3,0 0 36px #ec489988; }
      50%       { text-shadow: 3px 3px 0 #c026d3,-3px -3px 0 #c026d3,3px -3px 0 #c026d3,-3px 3px 0 #c026d3,0 0 60px #ec4899cc; }
    }
    .date-badge {
      display: inline-block;
      margin-top: 10px;
      background: linear-gradient(135deg, #c026d3, #ec4899);
      color: #fff;
      font-family: 'Rock Salt', cursive;
      font-size: 11px;
      padding: 4px 16px;
      border-radius: 4px;
      letter-spacing: 3px;
      transform: rotate(-1.5deg);
      position: relative; z-index: 1;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.5), 0 0 16px #c026d366;
    }

    /* ── Film photo ── */
    .film-frame {
      position: relative;
      background: #080808;
      padding: 6px 8px 28px;
    }
    .film-holes {
      display: flex;
      justify-content: space-around;
      padding: 3px 0 4px;
    }
    .film-holes span {
      width: 12px; height: 8px;
      background: #181818;
      border-radius: 2px;
      border: 1px solid #2a2a2a;
    }
    .photo-wrap {
      position: relative;
      height: 360px;
      overflow: hidden;
    }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 42%;
      display: block;
      filter: contrast(1.05) saturate(0.95) sepia(0.08);
    }
    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 45%, rgba(8,8,8,0.88) 100%);
    }
    .float-txt {
      position: absolute;
      font-family: 'Caveat', cursive;
      font-weight: 700;
      pointer-events: none;
    }
    .ft1 { top: 12px; left: 12px; font-size: 22px; color: #ffd166; text-shadow: 2px 2px 0 #7c4700; transform: rotate(-6deg); }
    .ft2 { top: 14px; right: 14px; font-size: 19px; color: #f9a8d4; text-shadow: 2px 2px 0 #6b1050; transform: rotate(5deg); }
    .ft3 { bottom: 54px; right: 14px; font-size: 20px; color: #a78bfa; text-shadow: 2px 2px 0 #3b0764; transform: rotate(3deg); }

    .film-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
    }
    .fc-num, .fc-date {
      font-family: 'Rock Salt', cursive;
      font-size: 7px;
      letter-spacing: 2px;
    }
    .fc-num  { color: #ff6eb4; }
    .fc-date { color: #ffd166; }

    /* ── Music player ── */
    .music-player {
      background: #0d0920;
      border-top: 1px solid #2a1a4a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c026d3, #ec4899);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 14px #c026d355;
      transition: transform .15s, box-shadow .15s;
    }
    .play-btn:hover  { transform: scale(1.08); box-shadow: 0 0 24px #c026d388; }
    .play-btn:active { transform: scale(0.95); }

    .music-label {
      font-family: 'Rock Salt', cursive;
      font-size: 8px;
      color: #a855f7;
      letter-spacing: 3px;
      flex: 1;
    }

    .wave-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
    }
    .wave-bars span {
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(to top, #c026d3, #ffd166);
      animation: wavebar var(--s, .8s) ease-in-out infinite alternate;
      height: 4px;
    }
    @keyframes wavebar { to { height: var(--h, 20px); } }
    .wave-bars.paused span { animation-play-state: paused; }

    /* ── Message body ── */
    .card-body {
      background: #100c1e;
      padding: 14px 28px 16px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .body-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      pointer-events: none;
    }
    .body-glow.b1 { width:160px; height:90px; background:#7c3aed; top:-30px; left:-30px; opacity:.2; }
    .body-glow.b2 { width:140px; height:80px; background:#ec4899; bottom:-20px; right:-10px; opacity:.2; }

    .msg-wrap {
      position: relative; z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .tag-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .tag {
      display: inline-block;
      padding: 3px 11px;
      border-radius: 3px;
      font-family: 'Rock Salt', cursive;
      font-size: 9px;
    }
    .tag-purple { background:#7c3aed; color:#f3e8ff; transform:rotate(-1.5deg); }
    .tag-pink   { background:#be185d; color:#fce7f3; transform:rotate(1deg); }
    .tag-gold   { background:#d97706; color:#fffbeb; transform:rotate(-2deg); }

    .msg-accent-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .msg-accent {
      font-family: 'Rock Salt', cursive;
      font-size: 16px;
      letter-spacing: 2px;
    }
    .a-pink   { color:#f472b6; text-shadow: 0 0 12px #f472b666, 2px 2px 0 #6b1050; }
    .a-purple { color:#a78bfa; text-shadow: 0 0 12px #a78bfa66, 2px 2px 0 #3b0764; }
    .a-gold   { color:#fbbf24; text-shadow: 0 0 12px #fbbf2466, 2px 2px 0 #78350f; }
    .dot-sep  { color:#555; font-size:12px; }

    .msg-en {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 15px;
      color: #d8b4fe;
      line-height: 1.55;
      letter-spacing: .5px;
    }

    /* ── Footer ── */
    .card-footer {
      background: #0a0717;
      padding: 9px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #2a1a4a;
      flex-shrink: 0;
    }
    .footer-left, .footer-right {
      font-family: 'Rock Salt', cursive;
      font-size: 8px;
      letter-spacing: 1px;
    }
    .footer-left  { color: #7c3aed; }
    .footer-right { color: #ec4899; }
    .footer-center { font-size: 16px; letter-spacing: 4px; }

    audio { display: none; }
  </style>
</head>
<body>

<div class="confetti-wrap" id="confetti"></div>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <div class="hdr-glow g1"></div>
    <div class="hdr-glow g2"></div>
    <div class="hdr-glow g3"></div>
    <div class="hdr-sub">✦ for my best friend ✦</div>
    <div class="hdr-title">Happy Birthday</div>
    <div class="date-badge">🎂 May 17 · 2026 🎂</div>
  </div>

  <!-- Film photo -->
  <div class="film-frame">
    <div class="film-holes">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="photo-wrap">
      <img src="birthday_photo.jpg" alt="birthday photo">
      <div class="photo-overlay"></div>
      <div class="float-txt ft1">Happy B-Day! 🎉</div>
      <div class="float-txt ft2">Best Friend ♥</div>
      <div class="float-txt ft3">Cheers! 🥂</div>
    </div>
    <div class="film-caption">
      <span class="fc-num">BRD · 0517</span>
      <span class="fc-date">2026 · FUJIFILM</span>
    </div>
  </div>

  <!-- Music player -->
  <div class="music-player">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="music-label">♪ &nbsp; NOW PLAYING</div>
    <div class="wave-bars paused" id="waveBars">
      <span style="--s:.7s;--h:20px;"></span>
      <span style="--s:.5s;--h:14px;"></span>
      <span style="--s:.9s;--h:22px;"></span>
      <span style="--s:.6s;--h:16px;"></span>
      <span style="--s:.8s;--h:20px;"></span>
      <span style="--s:.4s;--h:10px;"></span>
      <span style="--s:1.0s;--h:22px;"></span>
      <span style="--s:.65s;--h:18px;"></span>
    </div>
    <audio id="bgm" src="birthday_music.m4a" loop></audio>
  </div>

  <!-- Message -->
  <div class="card-body">
    <div class="body-glow b1"></div>
    <div class="body-glow b2"></div>
    <div class="msg-wrap">
      <div class="tag-row">
        <span class="tag tag-purple">Best Friend</span>
        <span class="tag tag-pink">05 · 17</span>
        <span class="tag tag-gold">HBD 🎉</span>
      </div>
      <div class="msg-accent-row">
        <span class="msg-accent a-pink">LAUGH</span>
        <span class="dot-sep">·</span>
        <span class="msg-accent a-purple">LOVE</span>
        <span class="dot-sep">·</span>
        <span class="msg-accent a-gold">LIVE</span>
      </div>
      <div class="msg-en">
        So lucky to have you in my life 🎈<br>
        May you always shine this bright ✨
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <div class="footer-left">For my bestie</div>
    <div class="footer-center">🎂🎉🎈</div>
    <div class="footer-right">Made with ♥</div>
  </div>

</div>

<script>
  const colors = ['#f472b6','#a78bfa','#fbbf24','#34d399','#60a5fa','#fb7185','#fcd34d'];
  const wrap = document.getElementById('confetti');
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'dot';
    const size = 4 + Math.random() * 8;
    el.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;--dur:${5+Math.random()*7}s;--delay:${Math.random()*8}s;opacity:0;`;
    wrap.appendChild(el);
  }

  const audio = document.getElementById('bgm');
  const btn   = document.getElementById('playBtn');
  const bars  = document.getElementById('waveBars');
  let playing = false;

  function togglePlay() {
    if (playing) {
      audio.pause();
      btn.textContent = '▶';
      bars.classList.add('paused');
    } else {
      audio.play();
      btn.textContent = '⏸';
      bars.classList.remove('paused');
    }
    playing = !playing;
  }
</script>

</body>
</html>
